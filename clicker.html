<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; margin: 0; padding-top: 50px; }
        #coin { 
            width: 150px; height: 150px; background: gold; border-radius: 50%; 
            margin: 20px auto; border: 8px solid #b38206; font-size: 60px; 
            display: flex; align-items: center; justify-content: center; 
            user-select: none; cursor: pointer;
        }
        #coin:active { transform: scale(0.9); }
        button { 
            padding: 15px 40px; background: #2ecc71; color: white; 
            border: none; border-radius: 50px; font-size: 18px; 
            font-weight: bold; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Очки: <span id="score">0</span></h1>
    <div id="coin" onclick="clickCoin()">₿</div>
    <button onclick="sendToBot()">СОХРАНИТЬ</button>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let score = 0;

        // Функция клика
        function clickCoin() {
            score++;
            document.getElementById('score').innerText = score;
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        // Функция отправки данных
        function sendToBot() {
            const dataStr = JSON.stringify({ game: "Кликер", score: score });
            
            // Всплывающее окно для проверки
            alert("Отправляю: " + score);
            
            // Самая важная команда
            tg.sendData(dataStr);
        }
    </script>
</body>
</html>
