<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; }
        #coin { width: 180px; height: 180px; background: gold; border-radius: 50%; margin: 50px auto; border: 10px solid #b38206; font-size: 80px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        button { padding: 15px 30px; background: #2ecc71; color: white; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Счет: <span id="score">0</span></h1>
    <div id="coin" onclick="clickCoin()">₿</div>
    <button onclick="save()">СОХРАНИТЬ</button>
    <script>
        let tg = window.Telegram.WebApp;
        let score = 0;
        function clickCoin() {
            score++;
            document.getElementById('score').innerText = score;
            tg.HapticFeedback.impactOccurred('light');
        }
        function save() {
            tg.sendData(JSON.stringify({game: "Кликер", score: score}));
        }
    </script>
</body>
</html>
